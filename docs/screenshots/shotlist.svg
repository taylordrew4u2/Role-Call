<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="1000" height="620" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect width="1000" height="44" rx="14" fill="#0f172a"/><rect y="22" width="1000" height="22" fill="#0f172a"/>
  <circle cx="24" cy="22" r="6" fill="#ef4444"/><circle cx="44" cy="22" r="6" fill="#f59e0b"/><circle cx="64" cy="22" r="6" fill="#22c55e"/>
  <rect x="300" y="12" width="400" height="20" rx="10" fill="#1e293b"/>
  <text x="500" y="27" fill="#64748b" font-size="12" text-anchor="middle">rolecall.app/project/shots</text>
  <text x="32" y="82" fill="#0f172a" font-size="18" font-weight="800">🎬 Scenes &amp; Shot List</text>
  <!-- controls -->
  <g transform="translate(560,64)" font-size="12" font-weight="600">
    <rect width="150" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="14" y="20" fill="#334155">🎥 Filming on: 1 cam</text>
    <rect x="160" width="230" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="176" y="20" fill="#334155">✨ Scenes &amp; shots from script</text>
  </g>
  <!-- view toggle -->
  <g transform="translate(32,104)" font-size="12" font-weight="600">
    <rect width="80" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="18" y="20" fill="#334155">By Scene</text>
    <rect x="88" width="78" height="30" rx="8" fill="#0f172a"/><text x="104" y="20" fill="#fff">By Cast</text>
    <rect x="174" width="68" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="190" y="20" fill="#334155">Table</text>
    <rect x="250" width="68" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="266" y="20" fill="#334155">Cards</text>
  </g>
  <!-- JANE group -->
  <text x="32" y="166" fill="#0f172a" font-size="14" font-weight="700">👤 Alex Rivera <tspan fill="#94a3b8" font-weight="400" font-style="italic">as JANE</tspan> <tspan fill="#94a3b8" font-size="11" font-weight="400">· 3 shots · 1 scene</tspan></text>
  <g transform="translate(32,178)" font-size="12">
    <rect width="936" height="92" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <line x1="0" y1="30" x2="936" y2="30" stroke="#f1f5f9"/><line x1="0" y1="61" x2="936" y2="61" stroke="#f1f5f9"/>
    <g fill="#94a3b8" font-weight="700" font-size="11"><text x="16" y="20">#</text><text x="80" y="20">DESCRIPTION</text><text x="640" y="20">SIZE</text><text x="720" y="20">ANGLE</text><text x="820" y="20">CHARACTER</text></g>
    <g fill="#334155"><text x="16" y="50" font-weight="700">1A</text><text x="80" y="50">You came back.</text><text x="640" y="50">OTS</text><text x="720" y="50">Eye-level</text><text x="820" y="50" fill="#0f172a" font-weight="600">JANE</text></g>
    <g fill="#334155"><text x="16" y="81" font-weight="700">1B</text><text x="80" y="81">Then why didn't you call me?</text><text x="640" y="81">CU</text><text x="720" y="81">Eye-level</text><text x="820" y="81" fill="#0f172a" font-weight="600">JANE</text></g>
  </g>
  <!-- SAM group -->
  <text x="32" y="300" fill="#0f172a" font-size="14" font-weight="700">👤 Sam Cole <tspan fill="#94a3b8" font-weight="400" font-style="italic">as SAM</tspan> <tspan fill="#94a3b8" font-size="11" font-weight="400">· 2 shots · 1 scene</tspan></text>
  <g transform="translate(32,312)" font-size="12">
    <rect width="936" height="62" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <line x1="0" y1="30" x2="936" y2="30" stroke="#f1f5f9"/>
    <g fill="#94a3b8" font-weight="700" font-size="11"><text x="16" y="20">#</text><text x="80" y="20">DESCRIPTION</text><text x="640" y="20">SIZE</text><text x="720" y="20">ANGLE</text><text x="820" y="20">CHARACTER</text></g>
    <g fill="#334155"><text x="16" y="50" font-weight="700">1C</text><text x="80" y="50">I never left. Not really.</text><text x="640" y="50">OTS</text><text x="720" y="50">Eye-level</text><text x="820" y="50" fill="#0f172a" font-weight="600">SAM</text></g>
  </g>
  <!-- Characters together -->
  <text x="32" y="406" fill="#0f172a" font-size="14" font-weight="700">👥 Characters together <tspan fill="#94a3b8" font-size="11" font-weight="400">· 2 shots</tspan></text>
  <g transform="translate(32,418)" font-size="12">
    <rect width="936" height="92" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <line x1="0" y1="30" x2="936" y2="30" stroke="#f1f5f9"/><line x1="0" y1="61" x2="936" y2="61" stroke="#f1f5f9"/>
    <g fill="#94a3b8" font-weight="700" font-size="11"><text x="16" y="20">#</text><text x="80" y="20">DESCRIPTION</text><text x="640" y="20">SIZE</text><text x="720" y="20">ANGLE</text><text x="820" y="20">CHARACTER</text></g>
    <g fill="#334155"><text x="16" y="50" font-weight="700">1D</text><text x="80" y="50">Rain streaks the window…</text><text x="640" y="50">WS</text><text x="720" y="50">Eye-level</text><text x="820" y="50" fill="#0f172a" font-weight="600">JANE, SAM</text></g>
    <g fill="#334155"><text x="16" y="81" font-weight="700">1E</text><text x="80" y="81">You came back.</text><text x="640" y="81">MWS</text><text x="720" y="81">Eye-level</text><text x="820" y="81" fill="#0f172a" font-weight="600">JANE, SAM</text></g>
  </g>
  <text x="32" y="548" fill="#475569" font-size="12" font-weight="600">Generated from the script · descriptions are the line/action · framing in Size · every shot has a Character</text>
  <text x="32" y="572" fill="#94a3b8" font-size="11">Export CSV · copy as text · print · iPhone vs. 2-camera coverage</text>
</svg>
