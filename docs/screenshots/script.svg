<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="1000" height="620" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect width="1000" height="44" rx="14" fill="#0f172a"/><rect y="22" width="1000" height="22" fill="#0f172a"/>
  <circle cx="24" cy="22" r="6" fill="#ef4444"/><circle cx="44" cy="22" r="6" fill="#f59e0b"/><circle cx="64" cy="22" r="6" fill="#22c55e"/>
  <rect x="300" y="12" width="400" height="20" rx="10" fill="#1e293b"/>
  <text x="500" y="27" fill="#64748b" font-size="12" text-anchor="middle">rolecall.app/project/script</text>
  <!-- title + writer chip -->
  <text x="32" y="82" fill="#0f172a" font-size="18" font-weight="800">📝 Script</text>
  <g transform="translate(760,66)">
    <rect width="200" height="30" rx="8" fill="#fffbeb" stroke="#fde68a"/>
    <text x="14" y="20" fill="#92400e" font-size="12" font-weight="600">👑 Writer: Alex Rivera</text>
  </g>
  <!-- tabs -->
  <g transform="translate(32,100)" font-size="13" font-weight="700">
    <text x="0" y="16" fill="#E11D2A">✎ Editing Script</text><rect y="26" width="110" height="3" fill="#E11D2A"/>
    <text x="150" y="16" fill="#94a3b8">✓ Final Script</text>
  </g>
  <!-- toolbar -->
  <g transform="translate(32,144)" font-size="11" font-weight="600" fill="#334155">
    <rect width="640" height="34" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="14" y="22">Scene</text><text x="66" y="22">Action</text><text x="124" y="22">Character</text><text x="204" y="22">Parenthetical</text><text x="304" y="22">Dialogue</text><text x="378" y="22">Transition</text>
    <rect x="470" y="6" width="100" height="22" rx="6" fill="#0f172a"/><text x="484" y="21" fill="#fff">+ New Scene</text>
  </g>
  <!-- editor -->
  <g transform="translate(32,190)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
    <rect width="640" height="290" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="20" y="34" fill="#0f172a" font-weight="700">INT. DINER – NIGHT</text>
    <text x="20" y="62" fill="#334155">Rain streaks the window. JANE sits across from SAM.</text>
    <text x="250" y="98" fill="#0f172a" font-weight="700">JANE</text>
    <text x="160" y="118" fill="#334155">You came back.</text>
    <text x="250" y="150" fill="#0f172a" font-weight="700">SAM</text>
    <text x="160" y="170" fill="#334155">I never left. Not really.</text>
    <rect x="150" y="186" width="220" height="20" rx="4" fill="#fef9c3"/>
    <text x="160" y="201" fill="#854d0e">Then why didn't you call me?</text>
    <text x="20" y="250" fill="#94a3b8">Auto-saving…</text>
  </g>
  <!-- suggestions panel -->
  <g transform="translate(692,190)">
    <rect width="276" height="290" rx="10" fill="#fff" stroke="#e2e8f0"/>
    <text x="16" y="28" fill="#0f172a" font-size="13" font-weight="700">Suggestions</text>
    <rect x="14" y="40" width="248" height="92" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="26" y="62" fill="#475569" font-size="11">Taylor suggested:</text>
    <text x="26" y="82" fill="#0f172a" font-size="11">“Then why didn't you call me?”</text>
    <text x="26" y="100" fill="#16a34a" font-size="11">→ “So why the silence, Sam?”</text>
    <g transform="translate(26,108)" font-size="11" font-weight="700">
      <rect width="60" height="22" rx="6" fill="#16a34a"/><text x="14" y="15" fill="#fff">✓ Approve</text>
      <rect x="70" width="60" height="22" rx="6" fill="#fee2e2"/><text x="84" y="15" fill="#b91c1c">✗ Decline</text>
    </g>
    <rect x="14" y="146" width="248" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="26" y="171" fill="#166534" font-size="11">✓ Approved — applied to draft</text>
    <rect x="14" y="236" width="248" height="40" rx="8" fill="#0f172a"/>
    <text x="138" y="261" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Publish to Final →</text>
  </g>
  <text x="32" y="512" fill="#475569" font-size="12" font-weight="600">Suggest-and-approve workflow · appointed Writer · Editing draft vs. published Final Script</text>
</svg>
