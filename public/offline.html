<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — RoleCall</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
  }
  .card {
    text-align: center;
    padding: 2rem;
  }
  .badge {
    font-size: 2.5rem;
  }
  h1 { font-size: 1.25rem; margin: 0.75rem 0 0.25rem; }
  p { color: #64748b; font-size: 0.9rem; margin: 0 0 1.25rem; }
  button {
    background: #dc2626;
    color: #fff;
    border: 0;
    border-radius: 0.5rem;
    padding: 0.6rem 1.4rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">🎬</div>
    <h1>You're offline</h1>
    <p>RoleCall needs a connection for this page. Pages you've visited recently may still work.</p>
    <button onclick="history.back()">Go back</button>
  </div>
</body>
</html>
